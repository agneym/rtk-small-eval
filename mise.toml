min_version = "2024.9.5"

[tools]
python = "3.13.14"
node = "25.9.0"
"aqua:rtk-ai/rtk" = "0.42.4"
"aqua:astral-sh/uv" = "0.10.11"

[env]
# Project-local venv: `mise install` creates it, `mise run install` populates it.
# `python` in this dir resolves to .venv/bin/python automatically once activated.
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Install Python deps (mini-swe-agent + litellm) into .venv"
alias = "i"
run = "uv pip install -r requirements.txt"

[tasks.smoke]
description = "Run the M3 end-to-end smoke test"
run = "python runs/smoke/run_m3_smoke.py"